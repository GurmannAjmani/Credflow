<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CredFlow Demo{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
        }

        .logo {
            font-weight: 700;
            color: #4a9eff;
        }

        nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        a, button {
            color: #4a9eff;
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        a:hover, button:hover {
            color: #6bb3ff;
        }

        .btn {
            padding: 10px 20px;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #6bb3ff;
            color: white;
        }

        .btn-secondary {
            background: #333;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .btn-danger {
            background: #ff6b6b;
        }

        .btn-danger:hover {
            background: #ff8888;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="file"] {
            padding: 8px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #4a9eff;
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.1);
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #4a1a1a;
            border: 1px solid #663333;
            color: #ff9999;
        }

        .alert-success {
            background: #1a4a2a;
            border: 1px solid #336644;
            color: #99ff99;
        }

        .alert-info {
            background: #1a2a4a;
            border: 1px solid #334466;
            color: #99ccff;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #e0e0e0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }

        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #4a9eff;
            margin-bottom: 8px;
        }

        .metric-label {
            font-size: 14px;
            color: #888;
        }

        .divider {
            border: none;
            border-top: 1px solid #333;
            margin: 24px 0;
        }

        .flex {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #333;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history-item {
            background: #1a1a1a;
            border-left: 3px solid #4a9eff;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 15px;
            }

            nav {
                width: 100%;
                justify-content: center;
            }

            .container {
                padding: 15px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1><span class="logo">CredFlow</span>Demo</h1>
            {% if session.get('user') %}
            <nav>
                <span style="color: #888;">{{ session['user'] }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
            </nav>
            {% endif %}
        </div>
    </header>

    <main class="container">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
